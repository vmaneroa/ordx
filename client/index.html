    />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ordx" />

    <meta name="description" content="Del caos al orden, al instante" />

    <meta name="format-detection" content="telephone=no" />

    <!-- Icono para la pantalla de inicio de iOS -->
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- Splash screen iOS — cubre iPhone SE hasta iPhone 16 Pro Max -->

      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"

      rel="apple-touch-startup-image"

    />

      rel="apple-touch-startup-image"

      rel="apple-touch-startup-image"

      rel="apple-touch-startup-image"

      href="/splash.png"
    />

    <link rel="icon" type="image/png" href="/icon-192.png" />
